<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Property Manager Pro 4.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>🏠 Property Manager Pro</h1>
      <p>Secure login</p>
      <label>Email<input id="loginEmail" type="email" autocomplete="email"></label>
      <label>Password<input id="loginPassword" type="password" autocomplete="current-password"></label>
      <button id="loginBtn" class="primary full">Login</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🏠</div>
        <div>
          <h2>Property Manager Pro</h2>
          <small id="userEmail"></small>
        </div>
      </div>
      <input id="searchInput" class="search" placeholder="Search anything...">
      <nav>
        <button data-page="dashboard">🏠 Dashboard</button>
        <button data-page="owners">👤 Owners</button>
        <button data-page="buildings">🏢 Buildings</button>
        <button data-page="units">🚪 Units</button>
        <button id="logoutBtn">Logout</button>
      </nav>
      <div class="side-title">Portfolio Explorer</div>
      <div id="portfolioTree"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <small id="pageSubtitle">Property Manager Pro 4.0 — Sprint 1</small>
        </div>
        <div class="top-actions">
          <button id="topAddOwner" class="primary">+ Owner</button>
          <button id="topAddBuilding" class="light">+ Building</button>
          <button id="topAddUnit" class="light">+ Unit</button>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Popup</h3>
        <button id="modalX" class="light">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-foot">
        <button id="modalDelete" class="danger hidden">Delete</button>
        <span class="spacer"></span>
        <button id="modalCancel" class="light">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
