<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Property Manager Pro v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="login" class="login">
    <div class="login-card">
      <h1>🏠 Property Manager Pro</h1>
      <p>Secure login</p>
      <label>Email<input id="loginEmail" type="email"></label>
      <label>Password<input id="loginPassword" type="password"></label>
      <button id="loginBtn" class="primary">Login</button>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h2>🏠 Property Manager Pro</h2>
        <small id="userEmail"></small>
      </div>
      <input id="searchBox" class="search" placeholder="Search anything...">
      <nav>
        <button data-page="dashboard">🏠 Dashboard</button>
        <button data-page="banking">🏦 Banking</button>
        <button data-page="documents">📁 Documents</button>
        <button data-page="roles">🔐 Users & Roles</button>
        <button id="logoutBtn">Logout</button>
      </nav>
      <h4>Portfolio Explorer</h4>
      <div id="portfolioTree"></div>
    </aside>

    <main>
      <header>
        <h1 id="pageTitle">Dashboard</h1>
        <div>
          <button id="addOwner" class="primary">+ Owner</button>
          <button id="addBuilding" class="light">+ Building</button>
          <button id="addUnit" class="light">+ Unit</button>
        </div>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Edit</h3>
        <button id="modalClose" class="light">x</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-foot">
        <button id="modalCancel" class="light">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
